name: Get watchlist from Google Sheets

on:
  workflow_dispatch:

jobs:
  get-watchlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch watchlist
        env:
          GSHEET_WEBAPP_URL: ${{ secrets.GSHEET_WEBAPP_URL }}
          GSHEET_API_TOKEN: ${{ secrets.GSHEET_API_TOKEN }}
        run: |
          python get_watchlist.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-output
          path: watchlist.json

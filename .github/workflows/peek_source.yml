name: Peek sources

on:
  workflow_dispatch:

jobs:
  peek:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run source checks
        run: |
          python peek_csv.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: peek-output
          path: |
            peek_result_erb.json
            peek_sample_erb.csv
            peek_result_asvp.json
            peek_sample_asvp.csv

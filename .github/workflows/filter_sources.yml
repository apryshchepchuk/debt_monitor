name: Filter ERB by watchlist

on:
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch watchlist
        env:
          GSHEET_WEBAPP_URL: ${{ secrets.GSHEET_WEBAPP_URL }}
          GSHEET_API_TOKEN: ${{ secrets.GSHEET_API_TOKEN }}
        run: |
          python get_watchlist.py

      - name: Fetch current ERB snapshot
        env:
          GSHEET_WEBAPP_URL: ${{ secrets.GSHEET_WEBAPP_URL }}
          GSHEET_API_TOKEN: ${{ secrets.GSHEET_API_TOKEN }}
        run: |
          python get_erb_current.py

      - name: Filter ERB
        run: |
          python filter_sources.py

      - name: Build alerts
        run: |
          python build_alerts.py

      - name: Push snapshot to Google Sheets
        env:
          GSHEET_WEBAPP_URL: ${{ secrets.GSHEET_WEBAPP_URL }}
          GSHEET_API_TOKEN: ${{ secrets.GSHEET_API_TOKEN }}
        run: |
          python push_snapshot.py

      - name: Push snapshot to Google Sheets
        env:
          GSHEET_WEBAPP_URL: ${{ secrets.GSHEET_WEBAPP_URL }}
          GSHEET_API_TOKEN: ${{ secrets.GSHEET_API_TOKEN }}
        run: |
          python push_snapshot.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: filtered-output
          path: |
            filtered_erb.json
            tech_rows.json
            watchlist.json
            erb_current.json
            alerts.json

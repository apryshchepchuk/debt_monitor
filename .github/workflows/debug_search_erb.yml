name: Debug ERB codes

on:
  workflow_dispatch:

jobs:
  debug-erb-codes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch watchlist
        env:
          GSHEET_WEBAPP_URL: ${{ secrets.GSHEET_WEBAPP_URL }}
          GSHEET_API_TOKEN: ${{ secrets.GSHEET_API_TOKEN }}
        run: |
          python get_watchlist.py

      - name: Run ERB code debug
        run: |
          python debug_codes_erb.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-erb-codes-output
          path: |
            debug_erb_codes.json
            watchlist.json
